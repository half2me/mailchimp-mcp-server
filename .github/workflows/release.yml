name: Release MCPB

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run bundle

      - uses: NimbleBrainInc/mcpb-pack@v2
        with:
          output: "mailchimp-mcp-server-{version}.mcpb"
          platform-os: any
          platform-arch: any
