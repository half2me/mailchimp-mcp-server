name: Release MCPB

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm run bundle

      - name: Pack MCPB bundle
        run: npx @anthropic-ai/mcpb pack . mailchimp-mcp-server-${{ github.event.release.tag_name }}.mcpb

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.event.release.tag_name }} mailchimp-mcp-server-${{ github.event.release.tag_name }}.mcpb
